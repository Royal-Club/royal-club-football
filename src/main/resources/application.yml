spring:
  application:
    name: royal-club-football

  main:
    allow-circular-references: true

  datasource:
    url: jdbc:mysql://localhost:3306/royal_club_football?useSSL=false&serverTimezone=UTC
    username: root
    password: brFc129
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    time-zone: UTC  # Ensure Jackson operates with UTC for date serialization

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate  # Validate schema without altering it
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc.time_zone: UTC  # Ensures Hibernate operates in UTC

  flyway:
    baseline-on-migrate: true  # Ensure Flyway migrates from a clean baseline

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB



server:
  port: 9191

jwt:
  secret: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZ2hpamts
  expiration: 604800000  # Token expiration in milliseconds (7 days)

player:
  default-password: JaniNa@123 # Configurable default password assigned at registration
  superadmin-email: rakibccj@gmail.com # Email of the player to assign SUPERADMIN role on application startup. Service will automatically assign this role when app starts. Leave empty to skip.

app:
  storage:
    player:
      provider: ${RC_PLAYER_STORAGE_PROVIDER:local}
      upload-dir: ${RC_PLAYER_UPLOAD_DIR:./uploads/player-profiles}
      base-url: ${RC_PLAYER_STORAGE_BASE_URL:http://localhost:${server.port}}
      r2:
        endpoint: ${RC_PLAYER_R2_ENDPOINT:}
        bucket: ${RC_PLAYER_R2_BUCKET:}
        access-key: ${RC_PLAYER_R2_ACCESS_KEY_ID:}
        secret-key: ${RC_PLAYER_R2_SECRET_ACCESS_KEY:}
        presign-duration-minutes: ${RC_PLAYER_R2_PRESIGN_MINUTES:60}

logging:
  level:
    root: INFO  # Default log level for the entire application
    com.bjit.royalclub.royalclubfootball: INFO  # Specific log level for your application package
  file:
    name: logs/royal_club_football.log  # Log file name and location
  logback:
    rollingpolicy:
      file-name-pattern: logs/royal_club_football.%d{yyyy-MM-dd}.%i.gz.log  # Rolling file configuration
      max-file-size: 10MB
      total-size-cap: 1GB
      max-history: 7
      clean-history-on-start: true
